# Manibandha — nginx site.
# Serves the built Vue SPA and proxies /api to the FastAPI backend.
# TLS lines are managed by certbot (already issued for manibandha.prema.su).
server {
    server_name manibandha.prema.su;

    root /var/www/manibandha.prema.su/frontend/dist;
    index index.html;
    charset utf-8;

    client_max_body_size 10m;

    # API -> FastAPI (gunicorn/uvicorn on 127.0.0.1:8010)
    location /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded images (persistent, outside the rebuilt dist)
    location /uploads/ {
        alias /var/www/manibandha.prema.su/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    error_log  /var/log/nginx/manibandha.prema.su-error.log;
    access_log /var/log/nginx/manibandha.prema.su-access.log;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/manibandha.prema.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manibandha.prema.su/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name manibandha.prema.su;
    if ($host = manibandha.prema.su) {
        return 301 https://$host$request_uri;
    }
    return 404;
}
